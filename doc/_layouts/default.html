<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Prevent flash: apply stored theme before CSS renders -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme-preference');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    }());
  </script>
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.github.repository_name | default: site.repository | default: 'jpmcli' }}</title>
  {% seo %}
  <style>
    /* ── Colour tokens: light defaults ── */
    :root {
      color-scheme: light dark;
      --bg:          #ffffff;
      --bg-alt:      #f6f8fa;
      --border:      #d0d7de;
      --text:        #1f2328;
      --text-muted:  #57606a;
      --link:        #0969da;
      --link-hover:  #0550ae;
      --header-bg:   #24292f;
      --header-text: #f0f6fc;
      --nav-link:    #cdd9e5;
      --nav-hover:   #ffffff;
      --btn-bg:      #f6f8fa;
      --btn-border:  #d0d7de;
      --btn-text:    #1f2328;
      --btn-hover:   #eaeef2;
      --code-bg:     #eff1f3;
      --pre-bg:      #f6f8fa;
      --table-head:  #f6f8fa;
      --blockquote:  #57606a;
      --blockquote-border: #d0d7de;
    }

    /* ── Auto dark mode: follows OS preference (no explicit user choice) ── */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]):not([data-theme="dark"]) {
        color-scheme: dark;
        --bg:          #0d1117;
        --bg-alt:      #161b22;
        --border:      #30363d;
        --text:        #e6edf3;
        --text-muted:  #8b949e;
        --link:        #58a6ff;
        --link-hover:  #79c0ff;
        --header-bg:   #010409;
        --header-text: #e6edf3;
        --nav-link:    #8b949e;
        --nav-hover:   #e6edf3;
        --btn-bg:      #21262d;
        --btn-border:  #30363d;
        --btn-text:    #e6edf3;
        --btn-hover:   #30363d;
        --code-bg:     #1f2428;
        --pre-bg:      #161b22;
        --table-head:  #161b22;
        --blockquote:  #8b949e;
        --blockquote-border: #3d444d;
      }
    }

    /* ── Explicit dark override ── */
    [data-theme="dark"] {
      color-scheme: dark;
      --bg:          #0d1117;
      --bg-alt:      #161b22;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --link:        #58a6ff;
      --link-hover:  #79c0ff;
      --header-bg:   #010409;
      --header-text: #e6edf3;
      --nav-link:    #8b949e;
      --nav-hover:   #e6edf3;
      --btn-bg:      #21262d;
      --btn-border:  #30363d;
      --btn-text:    #e6edf3;
      --btn-hover:   #30363d;
      --code-bg:     #1f2428;
      --pre-bg:      #161b22;
      --table-head:  #161b22;
      --blockquote:  #8b949e;
      --blockquote-border: #3d444d;
    }

    /* ── Explicit light override ── */
    [data-theme="light"] {
      color-scheme: light;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header / nav ── */
    header {
      background: var(--header-bg);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 3.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .site-title {
      color: var(--header-text);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }
    .site-title:hover { color: #fff; }

    nav {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    nav a {
      color: var(--nav-link);
      text-decoration: none;
      font-size: 0.875rem;
    }
    nav a:hover { color: var(--nav-hover); }

    /* ── Theme toggle button ── */
    #theme-toggle {
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--btn-text);
      border-radius: 6px;
      padding: 0.25rem 0.625rem;
      cursor: pointer;
      font-size: 0.8125rem;
      display: flex;
      align-items: center;
      gap: 0.375rem;
      line-height: 1.5;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    #theme-toggle:hover { background: var(--btn-hover); }

    .icon-auto  { display: none; }
    .icon-light { display: none; }
    .icon-dark  { display: none; }

    /* ── Main content ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Typography ── */
    h1, h2, h3, h4, h5, h6 {
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
    }
    h1 { font-size: 1.875rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    h2 { font-size: 1.375rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.125rem; }

    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }

    p { margin: 0.75rem 0; }

    ul, ol { padding-left: 2rem; margin: 0.75rem 0; }
    li { margin: 0.25rem 0; }

    /* ── Code ── */
    code {
      background: var(--code-bg);
      border-radius: 4px;
      padding: 0.1em 0.35em;
      font-size: 0.875em;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      color: var(--text);
    }

    pre {
      background: var(--pre-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      line-height: 1.5;
      margin: 1rem 0;
    }
    pre code {
      background: transparent;
      padding: 0;
      font-size: 0.875rem;
    }

    /* ── Tables ── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9375rem;
    }
    thead { background: var(--table-head); }
    th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      font-weight: 600;
    }
    td {
      padding: 0.45rem 0.75rem;
      border: 1px solid var(--border);
      vertical-align: top;
    }
    tbody tr:nth-child(even) { background: var(--bg-alt); }

    /* ── Blockquote ── */
    blockquote {
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      border-left: 4px solid var(--blockquote-border);
      color: var(--blockquote);
      background: var(--bg-alt);
      border-radius: 0 6px 6px 0;
    }
    blockquote p { margin: 0.25rem 0; }

    /* ── HR ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* ── Footer ── */
    footer {
      background: var(--bg-alt);
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8125rem;
      text-align: center;
      padding: 1rem 1.5rem;
    }
    footer a { color: var(--text-muted); }
    footer a:hover { color: var(--link); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      main   { padding: 1.25rem 1rem 3rem; }
      nav a  { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <a class="site-title" href="{{ '/' | relative_url }}">
      {{ site.github.repository_name | default: site.repository | default: 'jpmcli' }}
    </a>
    <nav>
      <a href="{{ '/index' | relative_url }}">Home</a>
      <a href="{{ '/downloads' | relative_url }}">Downloads</a>
      <a href="{{ '/installation' | relative_url }}">Installation</a>
      <button id="theme-toggle" aria-label="Toggle color theme" title="Toggle light / dark mode">
        <span class="icon-auto" aria-hidden="true">&#9680; Auto</span>
        <span class="icon-light" aria-hidden="true">&#9728;&#xFE0F; Light</span>
        <span class="icon-dark" aria-hidden="true">&#9790;&#xFE0F; Dark</span>
      </button>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <a href="https://github.com/{{ site.github.repository_nwo | default: site.repository | default: 'peterkir/jpmcli' }}">
      {{ site.github.repository_nwo | default: site.repository | default: 'peterkir/jpmcli' }}
    </a>
    &mdash; built with <a href="https://jekyllrb.com">Jekyll</a>
  </footer>

  <script>
  (function () {
    'use strict';

    var STORAGE_KEY = 'theme-preference';
    var html = document.documentElement;
    var btn  = document.getElementById('theme-toggle');

    /* Cycle order: auto → light → dark → auto … */
    var CYCLE = ['auto', 'light', 'dark'];

    function currentPref() {
      var t;
      try { t = localStorage.getItem(STORAGE_KEY); } catch (e) {}
      return (t === 'light' || t === 'dark') ? t : 'auto';
    }

    function applyPref(pref) {
      if (pref === 'auto') {
        html.removeAttribute('data-theme');
      } else {
        html.setAttribute('data-theme', pref);
      }
      try { localStorage.setItem(STORAGE_KEY, pref); } catch (e) {}
      updateButton(pref);
    }

    function updateButton(pref) {
      btn.querySelector('.icon-auto').style.display  = pref === 'auto'  ? 'inline' : 'none';
      btn.querySelector('.icon-light').style.display = pref === 'light' ? 'inline' : 'none';
      btn.querySelector('.icon-dark').style.display  = pref === 'dark'  ? 'inline' : 'none';
    }

    /* Initialise button label (theme already applied by inline head script) */
    updateButton(currentPref());

    btn.addEventListener('click', function () {
      var next = CYCLE[(CYCLE.indexOf(currentPref()) + 1) % CYCLE.length];
      applyPref(next);
    });

    /* Re-evaluate when OS theme changes and user is in 'auto' mode */
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
      if (currentPref() === 'auto') { updateButton('auto'); }
    });
  }());
  </script>
</body>
</html>
