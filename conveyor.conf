// conveyor.conf — Conveyor packaging configuration for jpmcli
// Docs: https://conveyor.hydraulic.dev/
//
// Prerequisites:
//   1. Build the fat JAR:  ./mvnw -Drevision=4.0.0 package -DskipTests
//   2. Install Conveyor:   https://conveyor.hydraulic.dev/download/
//   3. Run:                conveyor make site
//
// Conveyor downloads and embeds a JVM for each target platform automatically.
// The Main-Class (aQute.jpm.main.Main) is read from the JAR manifest produced
// by bnd-maven-plugin, so no extra launcher configuration is required here.

app {
  // ── Identity ──────────────────────────────────────────────────────────────
  vendor          = "aQute"
  display-name    = "JPM"
  description     = "Just Another Package Manager for Java"
  fsname          = "jpm"
  rdns-name       = "biz.aQute.jpm"
  version         = "4.0.0"
  contact-email   = "Peter.Kriens@aQute.biz"
  license         = "Apache 2"

  // ── Input: fat JAR built by Maven ─────────────────────────────────────────
  // Build with: ./mvnw -Drevision=4.0.0 package -DskipTests
  inputs += "target/biz.aQute.jpm.run-4.0.0-SNAPSHOT.jar"

  // ── JVM: Conveyor downloads and embeds Eclipse Temurin ───────────────────
  // Java 21 LTS is the minimum recommended embedded runtime.
  // Switch to 25 once it reaches LTS status (Sept 2025); it adds Project
  // Leyden AOT class-data sharing which further reduces CLI start-up time.
  jvm {
    gui     = false
    version = 21
  }

  // ── Target platforms (os.arch combinations) ───────────────────────────────
  machines = [
    windows.amd64
    linux.amd64
    linux.aarch64
    mac.amd64
    mac.aarch64
  ]

  // ── Windows ───────────────────────────────────────────────────────────────
  // console = true keeps the process attached to the terminal so stdout/stderr
  // are visible in cmd.exe / PowerShell / Windows Terminal.
  windows.console = true

  // ── macOS ─────────────────────────────────────────────────────────────────
  mac.bundle-identifier = "biz.aQute.jpm"

  // ── Linux ─────────────────────────────────────────────────────────────────
  // No extra runtime dependencies — the JRE is fully self-contained.
  linux.debian.depends = []
}
