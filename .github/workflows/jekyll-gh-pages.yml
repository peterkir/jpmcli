# .github/workflows/jekyll-gh-pages.yml
#
# Builds the Jekyll site from the doc/ folder and deploys it to GitHub Pages.
# Runs automatically after every successful CI Build on main, on direct pushes
# to main, and can be triggered manually.

name: Deploy doc on GitHub Pages

on:
  # Runs after the CI Build workflow completes on the master branch
  workflow_run:
    workflows: ["CI Build"]
    branches: ["master"]
    types: [completed]

  # Runs on pushes targeting the master branch
  push:
    branches: ["master"]

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do NOT cancel in-progress runs so that
# production deployments always complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  doc-build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject source revision for docs
        run: 'echo "source_revision: ${GITHUB_SHA}" >> doc/_config.yml'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./doc
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: doc-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
