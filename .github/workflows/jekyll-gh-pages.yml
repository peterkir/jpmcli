# .github/workflows/jekyll-gh-pages.yml
#
# Builds the Jekyll site from the doc/ folder and deploys it to GitHub Pages.
# Runs automatically after every successful CI Build on main, on direct pushes
# to main, and can be triggered manually.

name: Deploy doc on GitHub Pages

on:
  # Runs after the CI Build workflow completes on the main branch
  workflow_run:
    workflows: ["CI Build"]
    branches: ["main"]
    types: [completed]

  # Runs on pushes targeting the main branch
  push:
    branches: ["main"]

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do NOT cancel in-progress runs so that
# production deployments always complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  doc-build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Inject source revision for docs
        run: 'echo "source_revision: ${GITHUB_SHA}" >> doc/_config.yml'

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./doc
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: doc-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
