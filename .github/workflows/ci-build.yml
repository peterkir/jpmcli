# .github/workflows/ci-build.yml
#
# Consolidated CI build: builds self-extracting jpm launchers for all five
# platform/arch targets and publishes them to a GitHub Release.
#
# On every push to main the "latest-main" pre-release is updated so that
# the GitHub Pages download page always links to the most recent artifacts.
# On a version tag (v*) a proper, versioned GitHub Release is created.
#
# Runners used:
#   ubuntu-24.04          → Linux x86_64
#   ubuntu-24.04-arm      → Linux aarch64  (GitHub-hosted ARM runner)
#   macos-13              → macOS x86_64 (Intel)
#   macos-latest          → macOS aarch64 (Apple Silicon, M1+)
#   windows-latest        → Windows x86_64

name: CI Build

on:
  push:
    branches: ["main"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build SFX — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ───────────────────────────────────────────────
          - os:         ubuntu-24.04
            platform:   linux-amd64
            sfx-ext:    run
            sfx-script: packaging/oomph-sfx/create-sfx-unix.sh

          # ── Linux aarch64 ─────────────────────────────────────────────
          - os:         ubuntu-24.04-arm
            platform:   linux-aarch64
            sfx-ext:    run
            sfx-script: packaging/oomph-sfx/create-sfx-unix.sh

          # ── macOS x86_64 (Intel) ───────────────────────────────────────
          - os:         macos-13
            platform:   macos-amd64
            sfx-ext:    run
            sfx-script: packaging/oomph-sfx/create-sfx-unix.sh

          # ── macOS aarch64 (Apple Silicon) ─────────────────────────────
          - os:         macos-latest
            platform:   macos-aarch64
            sfx-ext:    run
            sfx-script: packaging/oomph-sfx/create-sfx-unix.sh

          # ── Windows x86_64 ────────────────────────────────────────────
          - os:         windows-latest
            platform:   windows-amd64
            sfx-ext:    bat
            sfx-script: packaging/oomph-sfx/create-sfx-windows.ps1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 21 is required for both Maven and jlink (jlink needs JDK 9+).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-${{ runner.arch }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-maven-

      # Step 1: Build the fat JAR.
      - name: Maven package
        shell: bash
        run: ./mvnw -B -Drevision=4.0.0 package -DskipTests

      # Step 2: Create the jlink JRE image via the jlink-sfx Maven profile.
      # Output: target/jre-image/
      - name: Create jlink JRE (Unix)
        if: runner.os != 'Windows'
        run: ./mvnw -B -Drevision=4.0.0 -Pjlink-sfx package -DskipTests

      - name: Create jlink JRE (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./mvnw -B -Drevision=4.0.0 -Pjlink-sfx package -DskipTests

      # Step 3: Produce the SFX file.

      - name: Create SFX (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x packaging/oomph-sfx/create-sfx-unix.sh
          packaging/oomph-sfx/create-sfx-unix.sh \
            target/biz.aQute.jpm.run-4.0.0.jar \
            target/jre-image \
            target/jpm-${{ matrix.platform }}.run

      - name: Create SFX (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pwsh -File packaging/oomph-sfx/create-sfx-windows.ps1 `
            -JarFile "target\biz.aQute.jpm.run-4.0.0.jar" `
            -JreDir  "target\jre-image" `
            -OutFile "target\jpm-${{ matrix.platform }}.bat" `
            -Version "4.0.0"

      # Upload the SFX as a workflow artifact.
      - name: Upload SFX artifact
        uses: actions/upload-artifact@v4
        with:
          name: jpm-${{ matrix.platform }}
          path: target/jpm-${{ matrix.platform }}.${{ matrix.sfx-ext }}
          retention-days: 30

  # Update the rolling "latest-main" pre-release after every successful push
  # to main so the GitHub Pages download page always points to fresh artifacts.
  snapshot-release:
    name: Update latest-main release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all SFX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Delete existing latest-main release (if any)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-main \
            --repo ${{ github.repository }} \
            --yes \
            --cleanup-tag \
          || true

      - name: Create/update latest-main pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: "Latest build from main"
          prerelease: true
          generate_release_notes: false
          body: |
            Automatically updated on every push to `main`.

            **Commit:** ${{ github.sha }}
            **Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: artifacts/**
          target_commitish: ${{ github.sha }}

  # Create a proper, versioned GitHub Release when a version tag is pushed.
  github-release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all SFX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
