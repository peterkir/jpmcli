# .github/workflows/ci-build.yml
#
# Consolidated CI build: builds self-extracting jpm launchers for all five
# platform/arch targets and publishes them to a GitHub Release.
#
# All jobs run on ubuntu-latest.  Each platform build downloads the correct
# pre-built Eclipse Temurin 21 JRE from the Adoptium API instead of running
# jlink on a native runner, so no ARM, macOS, or Windows CI runners are needed.
# All packaging scripts are plain bash; no PowerShell is required.
#
# On every push to main the "latest-main" pre-release is updated so that
# the GitHub Pages download page always links to the most recent artifacts.
# On a version tag (v*) a proper, versioned GitHub Release is created.

name: CI Build

on:
  push:
    branches: ["master"]
    tags:     ["v*"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  # ── Step 1: Build the fat JAR once ────────────────────────────────────────
  build-jar:
    name: Build fat JAR
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Maven package
        run: ./mvnw -B -Drevision=4.0.0 package -DskipTests

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: jpm-jar
          path: target/biz.aQute.jpm.run-4.0.0.jar
          retention-days: 1

  # ── Step 2: Build one SFX per target platform ─────────────────────────────
  build-sfx:
    name: Build SFX — ${{ matrix.platform }}
    needs: build-jar
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ─────────────────────────────────────────────────
          - platform:     linux-amd64
            temurin-os:   linux
            temurin-arch: x64
            jre-archive:  tar.gz
            sfx-ext:      run

          # ── Linux aarch64 ────────────────────────────────────────────────
          - platform:     linux-aarch64
            temurin-os:   linux
            temurin-arch: aarch64
            jre-archive:  tar.gz
            sfx-ext:      run

          # ── macOS x86_64 (Intel) ─────────────────────────────────────────
          - platform:     macos-amd64
            temurin-os:   mac
            temurin-arch: x64
            jre-archive:  tar.gz
            sfx-ext:      run

          # ── macOS aarch64 (Apple Silicon) ────────────────────────────────
          - platform:     macos-aarch64
            temurin-os:   mac
            temurin-arch: aarch64
            jre-archive:  tar.gz
            sfx-ext:      run

          # ── Windows x86_64 ───────────────────────────────────────────────
          - platform:     windows-amd64
            temurin-os:   windows
            temurin-arch: x64
            jre-archive:  zip
            sfx-ext:      bat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: jpm-jar
          path: target/

      # Download the pre-built Temurin 21 JRE for the target platform.
      # The Adoptium API returns a redirect; curl -L follows it.
      - name: Download Temurin 21 JRE (${{ matrix.platform }})
        run: |
          curl -fL \
            "https://api.adoptium.net/v3/binary/latest/21/ga/${{ matrix.temurin-os }}/${{ matrix.temurin-arch }}/jre/hotspot/normal/eclipse" \
            -o "jre.${{ matrix.jre-archive }}"

      - name: Extract JRE (tar.gz)
        if: matrix.jre-archive == 'tar.gz'
        run: |
          mkdir -p /tmp/jre-extract
          tar -xzf jre.tar.gz -C /tmp/jre-extract
          find /tmp/jre-extract -maxdepth 1 -mindepth 1 -type d \
            -exec mv {} target/jre-image \;

      - name: Extract JRE (zip)
        if: matrix.jre-archive == 'zip'
        run: |
          mkdir -p /tmp/jre-extract
          unzip -q jre.zip -d /tmp/jre-extract
          find /tmp/jre-extract -maxdepth 1 -mindepth 1 -type d \
            -exec mv {} target/jre-image \;

      - name: Create SFX (Unix)
        if: matrix.sfx-ext == 'run'
        run: |
          chmod +x packaging/oomph-sfx/create-sfx-unix.sh
          packaging/oomph-sfx/create-sfx-unix.sh \
            target/biz.aQute.jpm.run-4.0.0.jar \
            target/jre-image \
            target/jpm-${{ matrix.platform }}.run

      - name: Create SFX (Windows)
        if: matrix.sfx-ext == 'bat'
        run: |
          chmod +x packaging/oomph-sfx/create-sfx-windows.sh
          packaging/oomph-sfx/create-sfx-windows.sh \
            target/biz.aQute.jpm.run-4.0.0.jar \
            target/jre-image \
            target/jpm-${{ matrix.platform }}.bat \
            4.0.0

      - name: Upload SFX artifact
        uses: actions/upload-artifact@v4
        with:
          name: jpm-${{ matrix.platform }}
          path: target/jpm-${{ matrix.platform }}.${{ matrix.sfx-ext }}
          retention-days: 30

  # ── Update the rolling "latest-main" pre-release on every master push ───────
  snapshot-release:
    name: Update latest-main release
    needs: build-sfx
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all SFX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Delete existing latest-main release (if any)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-main \
            --repo ${{ github.repository }} \
            --yes \
            --cleanup-tag \
          || true

      - name: Create/update latest-main pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: "Latest build from main"
          prerelease: true
          generate_release_notes: false
          body: |
            Automatically updated on every push to `main`.

            **Commit:** ${{ github.sha }}
            **Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: artifacts/**
          target_commitish: ${{ github.sha }}

  # ── Create a versioned GitHub Release on a v* tag push ───────────────────
  github-release:
    name: GitHub Release
    needs: build-sfx
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all SFX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
